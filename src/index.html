<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12372a" />
    <meta
      name="description"
      content="Kisah Nusantara adalah aplikasi cerita komunitas berbasis peta, PWA, push notification, dan IndexedDB."
    />
    <link rel="shortcut icon" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./images/icons/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Kisah Nusantara</title>
    <script type="module" src="/scripts/index.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Lewati ke konten utama</a>
    <header class="app-header">
      <div class="main-header container">
        <a class="brand-name" href="#/" aria-label="Kisah Nusantara, beranda"
          >Kisah<span>Nusantara</span></a
        >
        <nav
          id="navigation-drawer"
          class="navigation-drawer"
          aria-label="Navigasi utama"
        >
          <ul id="nav-list" class="nav-list"></ul>
        </nav>
        <button
          id="drawer-button"
          class="drawer-button"
          type="button"
          aria-label="Buka menu navigasi"
          aria-controls="navigation-drawer"
          aria-expanded="false"
        >
          &#9776;
        </button>
      </div>
    </header>
    <main id="main-content" class="main-content" tabindex="-1"></main>
    <footer>
      <div class="container">
        Kisah Nusantara &middot; Cerita dan lokasi dari seluruh Indonesia
      </div>
    </footer>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
